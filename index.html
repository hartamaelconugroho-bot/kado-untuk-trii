<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Trii ✨</title>
    
    <!-- Font Estetik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Library Eksternal (SweetAlert & Confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #2c3e50; 
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-position: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* --- EFEK KUNANG-KUNANG --- */
        #fireflies {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Biar tidak mengganggu klik */
        }

        .firefly {
            position: absolute;
            bottom: -10px;
            width: 6px;
            height: 6px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffeb3b;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20vh) scale(1); }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        /* --- TOMBOL MUSIK --- */
        #musicBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            display: none; /* Muncul setelah paket dibuka */
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #musicBtn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.5);
        }

        /* Kartu Kaca */
        .glass-card {
            display: none;
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #instruksi {
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: opacity 0.5s;
        }

        /* --- STYLING UNTUK 4 KUE --- */
        #kolomKue {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            transition: opacity 0.5s;
        }

        .kue-item {
            font-size: 40px;
            list-style-type: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .kue-item:hover {
            transform: scale(1.3) translateY(-8px);
            filter: drop-shadow(0px 8px 12px rgba(255, 255, 255, 0.7));
        }

        .kue-item:active {
            transform: scale(0.9);
        }

        .kue-clicked {
            transform: scale(1.3) !important;
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.8));
            pointer-events: none;
        }

        .pesan-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 150px;
            margin-bottom: 30px;
            text-align: left;
            display: none; 
        }

        /* --- STYLING GALERI FOTO --- */
        #galeriFoto {
            display: none;
            animation: fadeIn 1s ease;
        }

        .foto-frame {
            width: 100%;
            max-height: 300px;
            height: auto;
            object-fit: contain; 
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-color: rgba(0, 0, 0, 0.2); 
        }

        .caption {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-style: italic;
            min-height: 50px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            margin: 5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        #btnLanjutPesan {
            display: none;
            margin: 0 auto;
        }

        .tombol-grup {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    
    <audio id="bgm" src="lagu.mp3" loop></audio>

    <div class="overlay"></div>
    <div id="fireflies"></div> <!-- Wadah Kunang-kunang -->
    
    <!-- Tombol Musik -->
    <button id="musicBtn" onclick="toggleMusic()">🎵</button>

    <div class="glass-card" id="card">
        <h1 id="judul">Nah, ini dia paketnya... ✨</h1>
        <p id="instruksi">Klik 4 KUE di bawah dulu ya buat buka! 🎂👇</p>
        
        <!-- Kolom Interaktif 4 Kue -->
        <div id="kolomKue">
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
        </div>
        
        <!-- Tempat Teks Mengetik -->
        <div id="tempatPesan" class="pesan-text"></div>
        <button id="btnLanjutPesan" onclick="bukaGaleri()">Ada sesuatu lagi nih 👀</button>

        <!-- Galeri Foto (Sembunyi di awal) -->
        <div id="galeriFoto">
            <img id="imgFoto" src="" class="foto-frame">
            <p id="teksFoto" class="caption"></p>
            <button id="btnNextFoto" onclick="nextFoto()">Lanjut ➡️</button>
            
            <div id="tombolAkhir" class="tombol-grup">
                <button onclick="munculQuote()">Tombol Anti-Stres 🧠</button>
                <button onclick="mainSuit()">Klaim Kado 🎁</button>
            </div>
        </div>
    </div>

    <script>
        // --- GENERATE KUNANG-KUNANG ---
        function buatKunangKunang() {
            const wadah = document.getElementById('fireflies');
            for (let i = 0; i < 35; i++) {
                let kunang = document.createElement('div');
                kunang.classList.add('firefly');
                kunang.style.left = Math.random() * 100 + 'vw';
                kunang.style.animationDuration = (Math.random() * 4 + 3) + 's';
                kunang.style.animationDelay = Math.random() * 3 + 's';
                wadah.appendChild(kunang);
            }
        }
        buatKunangKunang();

        // --- KONTROL MUSIK ---
        let musikMain = false;
        const lagu = document.getElementById("bgm");
        const musicBtn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (musikMain) {
                lagu.pause();
                musicBtn.innerHTML = "🔇";
            } else {
                lagu.play();
                musicBtn.innerHTML = "🎵";
            }
            musikMain = !musikMain;
        }

        // --- LOGIKA TUKANG PAKET ---
        window.onload = () => {
            setTimeout(kurirPaket, 500);
        };

        async function kurirPaket() {
            const { isConfirmed: diterima } = await Swal.fire({
                title: 'Permisi, Pakeeet! 📦',
                text: 'Apakah ini benar dengan kak Tri Yuliani Br Tampubolon?',
                showCancelButton: true,
                confirmButtonText: 'Iya, benar',
                cancelButtonText: 'Bukan',
                allowOutsideClick: false,
                allowEscapeKey: false,
                background: 'rgba(255, 255, 255, 0.95)'
            });

            if (diterima) {
                await Swal.fire({
                    title: 'Mantap! 🎁',
                    text: 'Ini ada paket buat kakak, silakan diterima dan dibuka ya!',
                    icon: 'success'
                });
                bukaPaket();
            } else {
                await Swal.fire({
                    title: 'Oh, bukan ya? 🤔',
                    text: 'Yaudah, saya nitip paketnya di sini ya. Tolong kasihin sampe orangnya datang!',
                    icon: 'info'
                });
                bukaPaket();
            }
        }

        function bukaPaket() {
            document.getElementById("card").style.display = "block";
        }

        // --- LOGIKA 4 KUE ---
        let totalKlikKue = 0;
        const semuaKue = document.querySelectorAll('.kue-item');

        semuaKue.forEach(kue => {
            kue.addEventListener('click', function() {
                this.innerHTML = "🎂";
                this.classList.add("kue-clicked");
                totalKlikKue++;

                if (totalKlikKue === 4) {
                    setTimeout(() => {
                        document.getElementById("kolomKue").style.display = "none";
                        document.getElementById("instruksi").style.display = "none";
                        document.getElementById("tempatPesan").style.display = "block";
                        mulaiPesan();
                    }, 800); 
                }
            });
        });

        // --- EFEK NGETIK PESAN ---
        const isiPesan = "Halo Trii, selamat ulang tahun ya! Maaf banget Kakek telat ngucapinnya hehe... Semoga di umur yang baru ini, segala lelah dan keringat kamu kerja buat nyari cuan tambahan sebelum masuk kampus nanti, bisa berbuah manis. Semangat terus kerjanya pejuang rupiah! Kakek tau kamu pasti bisa ngelewatin masa-masa capek ini. Sehat-sehat terus ya! ✨";
        
        let i = 0;
        const speed = 45; 

        function mulaiPesan() {
            musikMain = true;
            lagu.play();
            musicBtn.style.display = "flex"; // Munculkan tombol musik
            document.getElementById("judul").innerHTML = "Untuk Trii,";
            ketikPesan();
        }

        function ketikPesan() {
            if (i < isiPesan.length) {
                document.getElementById("tempatPesan").innerHTML += isiPesan.charAt(i);
                i++;
                setTimeout(ketikPesan, speed);
            } else {
                setTimeout(() => {
                    document.getElementById("btnLanjutPesan").style.display = "block";
                }, 1000);
            }
        }

        // --- LOGIKA GALERI FOTO ---
        const daftarFoto = ['foto1.jpg', 'foto2.jpg', 'foto3.jpg']; 
        const daftarCaption = [
            'Semangat terus ya kerjanya! Kakek selalu dukung kamu dari sini 🌻',
            'Jangan lupa istirahat, kesehatan itu nomor satu biar nggak tumbang 🤍',
            'Semoga semua urusanmu dilancarkan sampai masuk kampus nanti! You did well! 🚀'
        ];
        let fotoIndex = 0;

        function bukaGaleri() {
            document.getElementById("judul").innerHTML = "Kenangan Kita ✨";
            document.getElementById("tempatPesan").style.display = "none";
            document.getElementById("btnLanjutPesan").style.display = "none";
            document.getElementById("galeriFoto").style.display = "block";
            updateFoto();
        }

        function updateFoto() {
            document.getElementById("imgFoto").src = daftarFoto[fotoIndex];
            document.getElementById("teksFoto").innerHTML = daftarCaption[fotoIndex];
            
            if(fotoIndex === daftarFoto.length - 1) {
                document.getElementById("btnNextFoto").style.display = "none";
                document.getElementById("tombolAkhir").style.display = "flex";
            }
        }

        function nextFoto() {
            if(fotoIndex < daftarFoto.length - 1) {
                fotoIndex++;
                updateFoto();
            }
        }

        // --- TOMBOL ANTI-STRES (QUOTES RANDOM) ---
        const quotesKakek = [
            "Kerja terus boleh, tapi jangan lupa minum air putih! 🚰",
            "Overthinking nggak bikin cuan nambah, mending tarik napas panjang! 🧘‍♀️",
            "Kalau capek ya istirahat, kamu manusia bukan robot! 🤖",
            "Kakek bangga sama perjuanganmu, jangan nyerah ya! 💪",
            "Ingat, ujian dan kerjaan itu sementara, kerennya kamu itu permanen! ✨",
            "Senyum dikit dong, biar rezekinya makin lancar! 😊"
        ];

        function munculQuote() {
            const randomQuote = quotesKakek[Math.floor(Math.random() * quotesKakek.length)];
            Swal.fire({
                title: 'Pesan dari Kakek 💌',
                text: randomQuote,
                icon: 'info',
                confirmButtonText: 'Siap Laksanakan!'
            });
        }

        // --- GAME 2 LOGIC (SUIT LAWAN KAKEK & CONFETTI) ---
        async function mainSuit() {
            const choices = ['Gunting ✌️', 'Batu ✊', 'Kertas ✋'];
            
            const { value: pilihanTrii } = await Swal.fire({
                title: 'Game Penentuan Kado! 🎁',
                text: 'Kalahkan Kakek di game Suit ini buat dapet kado. Pilih senjata kamu:',
                input: 'radio',
                inputOptions: {
                    '0': 'Gunting ✌️',
                    '1': 'Batu ✊',
                    '2': 'Kertas ✋'
                },
                inputValidator: (value) => {
                    if (!value) { return 'Pilih dulu senjatanya dong! 😆' }
                },
                confirmButtonText: 'Lawan!',
                background: 'rgba(255, 255, 255, 0.95)'
            });

            if (pilihanTrii) {
                const kakekChoice = Math.floor(Math.random() * 3);
                const triiChoice = parseInt(pilihanTrii);
                
                if (triiChoice === kakekChoice) {
                    Swal.fire('Seri! 😲', `Kakek juga milih ${choices[kakekChoice]}. Ayo kita ulang!`, 'info').then(() => mainSuit());
                } 
                else if ((triiChoice === 0 && kakekChoice === 2) || (triiChoice === 1 && kakekChoice === 0) || (triiChoice === 2 && kakekChoice === 1)) {
                    // EFEK CONFETTI SAAT MENANG
                    var duration = 3 * 1000;
                    var end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 5,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#ff0000', '#00ff00', '#0000ff']
                        });
                        confetti({
                            particleCount: 5,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#ff0000', '#00ff00', '#0000ff']
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());

                    Swal.fire({
                        title: 'KAMU MENANG! 🎉', 
                        text: `Kakek milih ${choices[kakekChoice]}. Yeaay dapet kado!`, 
                        icon: 'success'
                    }).then(() => menujuWA());
                } 
                else {
                    Swal.fire({
                        title: 'YAAH KALAH! 😜', 
                        text: `Kakek milih ${choices[kakekChoice]}. Kakek menang! Coba lagi wleee!`, 
                        icon: 'error'
                    }).then(() => mainSuit());
                }
            }
        }

        async function menujuWA(){
            await Swal.fire({
                title: 'Hehe..',
                text: 'Nanti yaa kalo kita ada kesempatan jumpa 😆🎁',
                icon: 'success'
            });
            
            let pesanwhatsapp = "Wah Kakek kalah suit! Ditunggu beneran yaa kadonya pas kita jumpa nanti ><";
            window.location = "https://api.whatsapp.com/send?phone=&text=" + pesanwhatsapp;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Trii ✨</title>
    
    <!-- Font Estetik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 untuk Popup & Game Suit -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #2c3e50; /* Warna cadangan jika gambar lambat dimuat */
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-position: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* Kartu Kaca */
        .glass-card {
            display: none;
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #instruksi {
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: opacity 0.5s;
        }

        /* --- STYLING UNTUK 4 KUE --- */
        #kolomKue {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            transition: opacity 0.5s;
        }

        .kue-item {
            font-size: 40px;
            list-style-type: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .kue-item:hover {
            transform: scale(1.3) translateY(-8px);
            filter: drop-shadow(0px 8px 12px rgba(255, 255, 255, 0.7));
        }

        .kue-item:active {
            transform: scale(0.9);
        }

        .kue-clicked {
            transform: scale(1.3) !important;
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.8));
            pointer-events: none;
        }

        .pesan-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 150px;
            margin-bottom: 30px;
            text-align: left;
            display: none; 
        }

        /* --- STYLING GALERI FOTO --- */
        #galeriFoto {
            display: none;
            animation: fadeIn 1s ease;
        }

        .foto-frame {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Agar foto tidak gepeng */
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .caption {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-style: italic;
            min-height: 50px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        #btnLanjutPesan, #btnKado {
            display: none;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    
    <audio id="bgm" src="lagu.mp3"></audio>

    <div class="overlay"></div>

    <div class="glass-card" id="card">
        <h1 id="judul">Nah, ini dia paketnya... ✨</h1>
        <p id="instruksi">Klik 4 KUE di bawah dulu ya buat buka! 🎂👇</p>
        
        <!-- Kolom Interaktif 4 Kue -->
        <div id="kolomKue">
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
            <li class="kue-item">🍰</li>
        </div>
        
        <!-- Tempat Teks Mengetik -->
        <div id="tempatPesan" class="pesan-text"></div>
        <button id="btnLanjutPesan" onclick="bukaGaleri()">Ada sesuatu lagi nih 👀</button>

        <!-- Galeri Foto (Sembunyi di awal) -->
        <div id="galeriFoto">
            <img id="imgFoto" src="" class="foto-frame">
            <p id="teksFoto" class="caption"></p>
            <button id="btnNextFoto" onclick="nextFoto()">Lanjut ➡️</button>
            <button id="btnKado" onclick="mainSuit()">Klaim Kado 🎁</button>
        </div>
    </div>

    <script>
        // --- LOGIKA TUKANG PAKET ---
        window.onload = () => {
            setTimeout(kurirPaket, 500);
        };

        async function kurirPaket() {
            const { isConfirmed: diterima } = await Swal.fire({
                title: 'Permisi, Pakeeet! 📦',
                text: 'Apakah ini benar dengan kak Tri Yuliani Br Tampubolon?',
                showCancelButton: true,
                confirmButtonText: 'Iya, benar',
                cancelButtonText: 'Bukan',
                allowOutsideClick: false,
                allowEscapeKey: false,
                background: 'rgba(255, 255, 255, 0.95)'
            });

            if (diterima) {
                await Swal.fire({
                    title: 'Mantap! 🎁',
                    text: 'Ini ada paket buat kakak, silakan diterima dan dibuka ya!',
                    icon: 'success'
                });
                bukaPaket();
            } else {
                await Swal.fire({
                    title: 'Oh, bukan ya? 🤔',
                    text: 'Yaudah, saya nitip paketnya di sini ya. Tolong kasihin sampe orangnya datang!',
                    icon: 'info'
                });
                bukaPaket();
            }
        }

        function bukaPaket() {
            document.getElementById("card").style.display = "block";
        }

        // --- LOGIKA 4 KUE ---
        let totalKlikKue = 0;
        const semuaKue = document.querySelectorAll('.kue-item');

        semuaKue.forEach(kue => {
            kue.addEventListener('click', function() {
                this.innerHTML = "🎂";
                this.classList.add("kue-clicked");
                totalKlikKue++;

                if (totalKlikKue === 4) {
                    setTimeout(() => {
                        document.getElementById("kolomKue").style.display = "none";
                        document.getElementById("instruksi").style.display = "none";
                        document.getElementById("tempatPesan").style.display = "block";
                        mulaiPesan();
                    }, 800); 
                }
            });
        });

        // --- EFEK NGETIK PESAN ---
        const isiPesan = "Halo Trii, selamat ulang tahun ya! Maaf banget Kakek telat ngucapinnya hehe... Semoga di umur yang baru ini, segala lelah dan keringat kamu kerja buat nyari cuan tambahan sebelum masuk kampus nanti, bisa berbuah manis. Semangat terus kerjanya pejuang rupiah! Kakek tau kamu pasti bisa ngelewatin masa-masa capek ini. Sehat-sehat terus ya! ✨";
        
        let i = 0;
        const speed = 45; 

        function mulaiPesan() {
            document.getElementById("bgm").play();
            document.getElementById("judul").innerHTML = "Untuk Trii,";
            ketikPesan();
        }

        function ketikPesan() {
            if (i < isiPesan.length) {
                document.getElementById("tempatPesan").innerHTML += isiPesan.charAt(i);
                i++;
                setTimeout(ketikPesan, speed);
            } else {
                setTimeout(() => {
                    document.getElementById("btnLanjutPesan").style.display = "block";
                }, 1000);
            }
        }

        // --- LOGIKA GALERI FOTO ---
        // NAMA FILE FOTO HARUS SAMA PERSIS DENGAN YANG DI-UPLOAD KE GITHUB
        const daftarFoto = ['foto1.jpg', 'foto2.jpg', 'foto3.jpg']; 
        const daftarCaption = [
            'Semangat terus ya kerjanya! Kakek selalu dukung kamu dari sini 🌻',
            'Jangan lupa istirahat, kesehatan itu nomor satu biar nggak tumbang 🤍',
            'Semoga semua urusanmu dilancarkan sampai masuk kampus nanti! You did well! 🚀'
        ];
        let fotoIndex = 0;

        function bukaGaleri() {
            document.getElementById("judul").innerHTML = "Kenangan Kita ✨";
            document.getElementById("tempatPesan").style.display = "none";
            document.getElementById("btnLanjutPesan").style.display = "none";
            document.getElementById("galeriFoto").style.display = "block";
            updateFoto();
        }

        function updateFoto() {
            document.getElementById("imgFoto").src = daftarFoto[fotoIndex];
            document.getElementById("teksFoto").innerHTML = daftarCaption[fotoIndex];
            
            // Jika sudah foto terakhir, sembunyikan tombol lanjut, munculkan tombol Kado
            if(fotoIndex === daftarFoto.length - 1) {
                document.getElementById("btnNextFoto").style.display = "none";
                document.getElementById("btnKado").style.display = "inline-block";
            }
        }

        function nextFoto() {
            if(fotoIndex < daftarFoto.length - 1) {
                fotoIndex++;
                updateFoto();
            }
        }

        // --- GAME 2 LOGIC (SUIT LAWAN KAKEK) ---
        async function mainSuit() {
            const choices = ['Gunting ✌️', 'Batu ✊', 'Kertas ✋'];
            
            const { value: pilihanTrii } = await Swal.fire({
                title: 'Game Penentuan Kado! 🎁',
                text: 'Kalahkan Kakek di game Suit ini buat dapet kado. Pilih senjata kamu:',
                input: 'radio',
                inputOptions: {
                    '0': 'Gunting ✌️',
                    '1': 'Batu ✊',
                    '2': 'Kertas ✋'
                },
                inputValidator: (value) => {
                    if (!value) { return 'Pilih dulu senjatanya dong! 😆' }
                },
                confirmButtonText: 'Lawan!',
                background: 'rgba(255, 255, 255, 0.95)'
            });

            if (pilihanTrii) {
                const kakekChoice = Math.floor(Math.random() * 3);
                const triiChoice = parseInt(pilihanTrii);
                
                if (triiChoice === kakekChoice) {
                    Swal.fire('Seri! 😲', `Kakek juga milih ${choices[kakekChoice]}. Ayo kita ulang!`, 'info').then(() => mainSuit());
                } 
                else if ((triiChoice === 0 && kakekChoice === 2) || (triiChoice === 1 && kakekChoice === 0) || (triiChoice === 2 && kakekChoice === 1)) {
                    Swal.fire({
                        title: 'KAMU MENANG! 🎉', 
                        text: `Kakek milih ${choices[kakekChoice]}. Yeaay dapet kado!`, 
                        icon: 'success'
                    }).then(() => menujuWA());
                } 
                else {
                    Swal.fire({
                        title: 'YAAH KALAH! 😜', 
                        text: `Kakek milih ${choices[kakekChoice]}. Kakek menang! Coba lagi wleee!`, 
                        icon: 'error'
                    }).then(() => mainSuit());
                }
            }
        }

        async function menujuWA(){
            await Swal.fire({
                title: 'Hehe..',
                text: 'Nanti yaa kalo kita ada kesempatan jumpa 😆🎁',
                icon: 'success'
            });
            
            let pesanwhatsapp = "Wah Kakek kalah suit! Ditunggu beneran yaa kadonya pas kita jumpa nanti ><";
            window.location = "https://api.whatsapp.com/send?phone=&text=" + pesanwhatsapp;
        }
    </script>
</body>
</html>
